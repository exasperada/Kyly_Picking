{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login | Kyly Picking</title>
    <style>
        :root {
            --bg: #0b0b0d;
            --panel: #121214;
            --text: #f3f4f6;
            --muted: #a1a1aa;
            --yellow: #ffd81a;
            --danger: #ff5a5a;
            --success: #28d66c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at center, rgba(255, 216, 26, 0.08), transparent 26%),
                linear-gradient(180deg, #0a0a0b 0%, #101114 100%);
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .scanner-shell {
            width: min(100%, 390px);
            background: linear-gradient(180deg, #111214, #0c0d10);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 1.15rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        .hero {
            padding: 1.2rem 0 1.3rem;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2.15rem;
            line-height: 0.98;
            text-transform: uppercase;
        }

        .subtitle {
            margin: 0.85rem auto 0;
            max-width: 260px;
            color: var(--muted);
            line-height: 1.45;
        }

        .scan-box {
            position: relative;
            margin: 1rem 0 1rem;
            padding: 0.9rem;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border: 1px solid rgba(255, 216, 26, 0.18);
        }

        .scanner-frame {
            position: relative;
            min-height: 190px;
            overflow: hidden;
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
                radial-gradient(circle at center, rgba(255,216,26,0.08), transparent 70%);
        }

        .scanner-video {
            width: 100%;
            min-height: 190px;
            object-fit: cover;
            display: block;
            background: #08090b;
        }

        .scanner-mask {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .scanner-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--yellow);
            border-style: solid;
        }

        .corner-top-left {
            top: 14px;
            left: 14px;
            border-width: 3px 0 0 3px;
            border-radius: 10px 0 0 0;
        }

        .corner-top-right {
            top: 14px;
            right: 14px;
            border-width: 3px 3px 0 0;
            border-radius: 0 10px 0 0;
        }

        .corner-bottom-left {
            bottom: 14px;
            left: 14px;
            border-width: 0 0 3px 3px;
            border-radius: 0 0 0 10px;
        }

        .corner-bottom-right {
            bottom: 14px;
            right: 14px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 10px 0;
        }

        .scanner-laser {
            position: absolute;
            left: 12px;
            right: 12px;
            top: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--yellow), transparent);
            box-shadow: 0 0 18px rgba(255, 216, 26, 0.55);
        }

        .scanner-placeholder {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(255, 216, 26, 0.72);
            font-family: monospace;
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 1rem;
            line-height: 1.4;
        }

        .field {
            margin-bottom: 0.85rem;
        }

        input {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            background: #1c1d22;
            color: var(--text);
            padding: 1rem;
            text-align: center;
        }

        input::placeholder {
            color: #7b7e86;
            text-transform: uppercase;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 18px;
            background: var(--yellow);
            color: #0a0a0b;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 1rem;
            cursor: pointer;
        }

        .alert {
            margin-bottom: 0.9rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            background: rgba(255, 90, 90, 0.12);
            color: #ffc1c1;
            text-align: center;
        }

        .security {
            margin-top: 1rem;
            text-align: center;
            color: #7b7e86;
            font-size: 0.8rem;
        }
    </style>
</head>
<body data-login-error="{% if erro %}1{% else %}0{% endif %}">
    <div class="scanner-shell">
        <div class="hero">
            <h1>Escaneie<br>Seu Cracha</h1>
            <p class="subtitle">Libere a camera, leia o cracha e entre no fluxo de operador ou gestao.</p>
        </div>

        <div class="scan-box">
            <div class="scanner-frame">
                <video id="badge-scanner-video" class="scanner-video" autoplay muted playsinline></video>
                <div id="badge-scanner-placeholder" class="scanner-placeholder">Inicializando camera...</div>
                <div class="scanner-mask">
                    <span class="scanner-corner corner-top-left"></span>
                    <span class="scanner-corner corner-top-right"></span>
                    <span class="scanner-corner corner-bottom-left"></span>
                    <span class="scanner-corner corner-bottom-right"></span>
                    <span class="scanner-laser"></span>
                </div>
            </div>
        </div>

        {% if erro %}
        <div class="alert">{{ erro }}</div>
        {% endif %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <div class="field">
                <input id="username" name="username" type="text" placeholder="Ou digite a matricula..." required autofocus>
            </div>
            <div class="field">
                <input id="password" name="password" type="password" placeholder="Senha de acesso..." required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <div class="security">Ambiente seguro</div>
    </div>

    <script src="{% static 'js/audio.js' %}"></script>
    <script>
        const loginForm = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginHasError = document.body.dataset.loginError === "1";
        const badgePlaceholder = document.getElementById("badge-scanner-placeholder");
        const video = document.getElementById("badge-scanner-video");

        let scannerSubmitting = false;
        let scannerStream = null;
        let barcodeDetector = null;
        let lastDetectedValue = "";
        let lastDetectedAt = 0;
        let backendScanTimer = null;

        const badgeMap = {
            OPERATOR: { username: "operator", password: "123456" },
            MANAGER: { username: "manager", password: "123456" },
            OPERADOR: { username: "operator", password: "123456" },
            GESTOR: { username: "manager", password: "123456" },
            OPERATOR123456: { username: "operator", password: "123456" },
            MANAGER123456: { username: "manager", password: "123456" }
        };

        function submitLoginAutomatically() {
            if (scannerSubmitting) {
                return;
            }
            scannerSubmitting = true;
            loginForm.submit();
        }

        function setScannerMessage(message) {
            badgePlaceholder.textContent = message;
            badgePlaceholder.hidden = false;
        }

        function captureVideoFrame() {
            if (!video.videoWidth || !video.videoHeight) {
                return null;
            }

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext("2d", { willReadFrequently: true });
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL("image/png");
        }

        async function decodeFrameViaBackend() {
            if (scannerSubmitting || !scannerStream) {
                return;
            }

            const image = captureVideoFrame();
            if (!image) {
                return;
            }

            try {
                const response = await fetch("/api/scan/login/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image }),
                });
                const data = await response.json();
                const rawValue = (data.codigo || "").trim().toUpperCase();

                if (!rawValue) {
                    return;
                }

                const userData = badgeMap[rawValue];
                if (!userData) {
                    await window.SoundEffects?.playError?.();
                    setScannerMessage("Cracha nao reconhecido. Use um cracha demo valido.");
                    return;
                }

                usernameInput.value = userData.username;
                passwordInput.value = userData.password;
                await window.SoundEffects?.playSuccess?.();
                if (backendScanTimer) {
                    window.clearInterval(backendScanTimer);
                    backendScanTimer = null;
                }
                if (scannerStream) {
                    scannerStream.getTracks().forEach((track) => track.stop());
                }
                submitLoginAutomatically();
            } catch (error) {
                setScannerMessage("Falha na leitura pelo servidor. Centralize o cracha e aproxime mais da camera.");
            }
        }

        async function startLoginScanner() {
            if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== "function") {
                setScannerMessage("Camera nao suportada neste navegador. Digite a matricula manualmente.");
                return;
            }

            try {
                video.setAttribute("autoplay", "true");
                video.setAttribute("muted", "true");
                video.setAttribute("playsinline", "true");

                scannerStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                    },
                    audio: false,
                });

                video.srcObject = scannerStream;
                try {
                    await video.play();
                } catch (error) {
                    /* o stream pode continuar valido mesmo se o play rejeitar */
                }

                badgePlaceholder.textContent = "Aponte a camera para o cracha demo";

                if (!("BarcodeDetector" in window)) {
                    setScannerMessage("Camera ativa. Usando leitor embutido do servidor.");
                    backendScanTimer = window.setInterval(decodeFrameViaBackend, 850);
                    return;
                }

                let formats = ["code_39", "code_128", "qr_code"];
                if (typeof window.BarcodeDetector.getSupportedFormats === "function") {
                    const supported = await window.BarcodeDetector.getSupportedFormats();
                    const filtered = formats.filter((format) => supported.includes(format));
                    if (filtered.length) {
                        formats = filtered;
                    }
                }

                barcodeDetector = new window.BarcodeDetector({ formats });
                badgePlaceholder.hidden = true;
                scanLoop();
            } catch (error) {
                setScannerMessage("Nao foi possivel iniciar a camera. Verifique a permissao do navegador.");
            }
        }

        async function scanLoop() {
            if (!barcodeDetector || !video || scannerSubmitting) {
                return;
            }

            try {
                const barcodes = await barcodeDetector.detect(video);
                if (barcodes.length) {
                    const rawValue = (barcodes[0].rawValue || "").trim().toUpperCase();
                    const now = Date.now();

                    if (rawValue && (rawValue !== lastDetectedValue || now - lastDetectedAt > 1200)) {
                        lastDetectedValue = rawValue;
                        lastDetectedAt = now;

                        const userData = badgeMap[rawValue];
                        if (!userData) {
                            await window.SoundEffects?.playError?.();
                            setScannerMessage("Cracha nao reconhecido. Use um cracha demo valido.");
                        } else {
                            usernameInput.value = userData.username;
                            passwordInput.value = userData.password;
                            await window.SoundEffects?.playSuccess?.();
                            if (scannerStream) {
                                scannerStream.getTracks().forEach((track) => track.stop());
                            }
                            submitLoginAutomatically();
                            return;
                        }
                    }
                }
            } catch (error) {
                setScannerMessage("Falha momentanea na leitura. Aproxime o cracha da camera.");
            }

            window.requestAnimationFrame(scanLoop);
        }

        if (loginHasError && window.SoundEffects) {
            window.SoundEffects.playError();
        }

        loginForm.addEventListener("submit", async (event) => {
            if (scannerSubmitting) {
                return;
            }
            event.preventDefault();
            await window.SoundEffects?.playSuccess?.();
            submitLoginAutomatically();
        });

        document.addEventListener("DOMContentLoaded", () => {
            window.setTimeout(startLoginScanner, 150);
        });
    </script>
</body>
</html>
